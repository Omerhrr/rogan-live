services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rogan
      POSTGRES_PASSWORD: rogan_secret
      POSTGRES_DB: rogan_live
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rogan -d rogan_live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Alembic Migrations ─────────────────────────────────────────
  alembic-migrate:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://rogan:rogan_secret@postgres:5432/rogan_live
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      JWT_SECRET: change-me-in-production
      DEBUG: "true"
      USE_ALEMBIC: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: alembic upgrade head

  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://rogan:rogan_secret@postgres:5432/rogan_live
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      JWT_SECRET: change-me-in-production
      DEBUG: "true"
      USE_ALEMBIC: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "8000:8000"
    depends_on:
      alembic-migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Vue 3 Frontend ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
      VITE_WS_URL: ws://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host 0.0.0.0

  # ── MediaMTX (RTMP / LL-HLS / WebRTC) ─────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935"   # RTMP
      - "8888:8888"   # LL-HLS
      - "8889:8889"   # WebRTC
      - "9997:9997"   # API
    volumes:
      - ./backend/config/mediamtx.yml:/mediamtx.yml
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
